---
layout: default
---

<article class="post-shell{% if page.hide_first_heading %} hide-first-heading{% endif %}">
  <a class="back-link" href="{{ "/" | relative_url }}">{{ site.theme_config.back_home_text }}</a>

  <header class="post-hero">
    <p class="section-kicker">field note</p>
    <h1 class="post-title">{{ page.title }}</h1>
    {% include date_and_social_share.html %}
  </header>

  <div class="post-body">
    {{ content }}
  </div>
</article>
