research_entries:
  - title: Data Center Field Atlas
    eyebrow: visual research
    status: coming soon
    desc: A Pudding-style explainer series on compute infrastructure, factory testing, cluster operations, and the strange metrics that decide whether machines are ready for production.

  - title: Agent Evaluation Notes
    eyebrow: agent systems
    status: in progress
    desc: Notes on tool use, traces, guardrails, handoffs, and the practical difference between impressive demos and dependable operational agents.

  - title: Compute Ops Comparisons
    eyebrow: industry maps
    status: planned
    desc: Visual comparisons for vendors, workflows, failure modes, and reliability patterns across the data center ecosystem.

principles:
  - title: Make invisible systems observable
    desc: Logs, tests, and telemetry become useful only when humans can see what changed and why it matters.

  - title: Build agents with traces
    desc: Good agents should leave behind plans, tool calls, uncertainty, and enough evidence to audit their decisions.

  - title: Explain before optimizing
    desc: The fastest way to improve a workflow is often to draw the system clearly enough that everyone can point at the bottleneck.

